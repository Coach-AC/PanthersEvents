<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panthers Events</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    .logo-container {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid #C9A84C;
      box-shadow: 
        0 0 20px #C9A84C,
        0 0 40px #C9A84C,
        0 0 80px rgba(201, 168, 76, 0.6),
        0 0 120px rgba(201, 168, 76, 0.3);
      margin-bottom: 30px;
      background-color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;

      /* Pulsing glow animation */
      animation: pulse-glow 2.5s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0% {
        box-shadow: 
          0 0 20px #C9A84C,
          0 0 40px #C9A84C,
          0 0 80px rgba(201, 168, 76, 0.6),
          0 0 120px rgba(201, 168, 76, 0.3);
      }
      50% {
        box-shadow: 
          0 0 30px #C9A84C,
          0 0 60px #C9A84C,
          0 0 100px rgba(201, 168, 76, 0.8),
          0 0 160px rgba(201, 168, 76, 0.5);
      }
      100% {
        box-shadow: 
          0 0 20px #C9A84C,
          0 0 40px #C9A84C,
          0 0 80px rgba(201, 168, 76, 0.6),
          0 0 120px rgba(201, 168, 76, 0.3);
      }
    }

    .logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    h1 {
      color: #ffffff;
      font-size: 80px;
      font-weight: bold;
      letter-spacing: 8px;
      text-transform: uppercase;

      /* Gold text glow */
      text-shadow:
        0 0 10px #C9A84C,
        0 0 20px #C9A84C,
        0 0 40px rgba(201, 168, 76, 0.5);
    }

    nav {
      margin-top: 40px;
    }

    nav a {
      color: #C9A84C;
      text-decoration: none;
      font-size: 18px;
      margin: 0 20px;
      letter-spacing: 2px;
      border-bottom: 2px solid transparent;
      transition: border-bottom 0.3s;
    }

    nav a:hover {
      border-bottom: 2px solid #C9A84C;
    }

  </style>
</head>
<body>

  <div class="logo-container">
    <img class="logo" src="Panthers_Logo.JPG" alt="Panthers Logo">
  </div>

  <h1>Panthers</h1>

  <nav>
    <a href="index2.html">Events</a>
    <a href="Panthers_Summer_Exchange_2026.html">Summer Exchange 2026</a>
  </nav>

</body>
</html>
